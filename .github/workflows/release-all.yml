name: release-all

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Pass 'skip' to skip version bump and release gems at current versions.
        required: true
        default: 'skip'
      dry_run:
        description: 'Dry run (build only, do not push to RubyGems)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Build all gems
      run: bundle exec rake build:all

    - name: Setup RubyGems credentials
      if: ${{ !inputs.dry_run }}
      run: |
        mkdir -p ~/.gem
        cat > ~/.gem/credentials << EOF
        ---
        :rubygems_api_key: ${{ secrets.METANORMA_CI_RUBYGEMS_API_KEY }}
        EOF
        chmod 0600 ~/.gem/credentials

    - name: Release all gems to RubyGems
      if: ${{ !inputs.dry_run }}
      run: bundle exec rake release:all

    - name: Dry run summary
      if: ${{ inputs.dry_run }}
      run: |
        echo "## Dry Run Summary"
        echo "All gems built successfully:"
        find . -name "*.gem" -not -path "*/vendor/*" -exec basename {} \;

    - name: Cleanup
      if: always()
      run: bundle exec rake clean:all
