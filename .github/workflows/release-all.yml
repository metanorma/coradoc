name: release-all

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Pass 'skip' to skip version bump and release gems at current versions.
        required: true
        default: 'skip'
      gems:
        description: |
          Comma-separated list of gems to release (e.g. 'coradoc,coradoc-adoc').
          Leave empty to release ALL gems.
        required: false
        default: ''
      dry_run:
        description: 'Dry run (build only, do not push to RubyGems)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Determine gems to release
      id: gems
      run: |
        ALL_GEMS="coradoc coradoc-adoc coradoc-docx coradoc-markdown coradoc-html"
        INPUT="${{ inputs.gems }}"
        if [ -z "$INPUT" ]; then
          echo "targets=$ALL_GEMS" >> "$GITHUB_OUTPUT"
          echo "Releasing all gems: $ALL_GEMS"
        else
          # Validate input gems exist
          for g in $(echo "$INPUT" | tr ',' ' '); do
            if ! echo "$ALL_GEMS" | grep -qw "$g"; then
              echo "::error::Unknown gem: $g. Valid gems: $ALL_GEMS"
              exit 1
            fi
          done
          TARGETS=$(echo "$INPUT" | tr ',' ' ')
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "Releasing selected gems: $TARGETS"
        fi

    - name: Bump versions
      if: inputs.next_version != 'skip'
      run: |
        BUMP="${{ inputs.next_version }}"

        bump_version() {
          local current="$1"
          local major minor patch pre
          # Parse version, stripping any pre-release suffix
          version_base="${current%%-*}"
          pre="${current#"$version_base"}"
          pre="${pre#-}"
          IFS='.' read -r major minor patch <<< "$version_base"
          case "$BUMP" in
            major)   major=$((major + 1)); minor=0; patch=0; pre="" ;;
            minor)   minor=$((minor + 1)); patch=0; pre="" ;;
            patch)   patch=$((patch + 1)); pre="" ;;
            *)       # Assume explicit version like x.y.z
              echo "$BUMP"
              return
              ;;
          esac
          if [ -n "$pre" ]; then
            echo "${major}.${minor}.${patch}-${pre}"
          else
            echo "${major}.${minor}.${patch}"
          fi
        }

        for gem in ${{ steps.gems.outputs.targets }}; do
          case "$gem" in
            coradoc)        version_file="lib/coradoc/version.rb" ;;
            coradoc-adoc)   version_file="coradoc-adoc/lib/coradoc/asciidoc/version.rb" ;;
            coradoc-docx)   version_file="coradoc-docx/lib/coradoc/docx/version.rb" ;;
            coradoc-html)   version_file="coradoc-html/lib/coradoc/html/version.rb" ;;
            coradoc-markdown) version_file="coradoc-markdown/lib/coradoc/markdown/version.rb" ;;
          esac

          current=$(grep -oP "VERSION\s*=\s*'\K[^']+" "$version_file")
          new_version=$(bump_version "$current")

          if [ "$new_version" != "$current" ]; then
            echo "Bumping $gem: $current -> $new_version"
            sed -i "s/VERSION\s*=\s*'[^']*'/VERSION = '$new_version'/" "$version_file"
          else
            echo "$gem already at $current, no bump needed"
          fi
        done

    - name: Commit version bumps
      if: inputs.next_version != 'skip'
      run: |
        if git diff --quiet; then
          echo "No version changes to commit"
        else
          git add '**/version.rb' 'lib/coradoc/version.rb'
          git commit -m "chore: bump gem versions for release"
          git push origin main
        fi

    - name: Build gems
      run: |
        for gem in ${{ steps.gems.outputs.targets }}; do
          dir="$gem"
          if [ "$gem" = "coradoc" ]; then dir="."; fi
          echo "Building $gem..."
          (cd "$dir" && gem build *.gemspec)
        done

    - name: Setup RubyGems credentials
      if: ${{ !inputs.dry_run }}
      run: |
        mkdir -p ~/.gem
        cat > ~/.gem/credentials << EOF
        ---
        :rubygems_api_key: ${{ secrets.METANORMA_CI_RUBYGEMS_API_KEY }}
        EOF
        chmod 0600 ~/.gem/credentials

    - name: Release gems to RubyGems
      if: ${{ !inputs.dry_run }}
      run: |
        for gem in ${{ steps.gems.outputs.targets }}; do
          dir="$gem"
          if [ "$gem" = "coradoc" ]; then dir="."; fi
          gem_file=$(ls "$dir"/*.gem 2>/dev/null | head -1)
          if [ -n "$gem_file" ]; then
            echo "Pushing $gem_file..."
            gem push "$gem_file"
          else
            echo "::warning::No gem file found for $gem"
          fi
        done

    - name: Dry run summary
      if: ${{ inputs.dry_run }}
      run: |
        echo "## Dry Run Summary"
        echo "Gems that would be released:"
        for gem in ${{ steps.gems.outputs.targets }}; do
          dir="$gem"
          if [ "$gem" = "coradoc" ]; then dir="."; fi
          gem_file=$(ls "$dir"/*.gem 2>/dev/null | head -1)
          if [ -n "$gem_file" ]; then
            echo "  - $(basename "$gem_file")"
          fi
        done

    - name: Cleanup
      if: always()
      run: find . -name "*.gem" -not -path "*/vendor/*" -delete
